<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愿望瓶</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Long+Cang&family=Noto+Serif+SC:wght@400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<template id="__bundler_thumbnail" data-bg-color="#1a1330">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="thumb-moon" cx="50%" cy="40%" r="50%">
        <stop offset="0%" stop-color="#fff4d0"/>
        <stop offset="100%" stop-color="#e0c87a"/>
      </radialGradient>
    </defs>
    <rect width="1200" height="800" fill="#1a1330"/>
    <circle cx="960" cy="200" r="64" fill="url(#thumb-moon)" opacity="0.85"/>
    <!-- Bottle silhouette -->
    <path d="M 510 250
             L 510 235 Q 510 222, 522 222 L 678 222 Q 690 222, 690 235 L 690 250
             L 720 305 L 720 555 Q 720 605, 660 605 L 540 605 Q 480 605, 480 555 L 480 305 Z"
          fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
    <ellipse cx="600" cy="222" rx="90" ry="8" fill="rgba(255,255,255,0.30)"/>
    <!-- Stars inside -->
    <g fill="#ffd789" stroke="#e0b057" stroke-width="1">
      <polygon points="560,540 564,548 573,549 566,555 568,564 560,560 552,564 554,555 547,549 556,548" />
      <polygon points="610,550 614,558 623,559 616,565 618,574 610,570 602,574 604,565 597,559 606,558" fill="#ffb18a"/>
      <polygon points="650,535 654,543 663,544 656,550 658,559 650,555 642,559 644,550 637,544 646,543" fill="#a8d8b9"/>
    </g>
    <!-- App name -->
    <text x="600" y="700" font-family="serif" font-size="48" fill="#f6efdc" text-anchor="middle" letter-spacing="12">愿望瓶</text>
  </svg>
</template>
<body>
  <!-- Starry background particles -->
  <div class="bg-stars" id="bg-stars" aria-hidden="true"></div>
  <div class="bg-moon" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">✦</span>
      <span class="brand-name">愿望瓶</span>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-view="bottle" role="tab">我的瓶子</button>
      <button class="tab" data-view="mine" role="tab">许过的愿</button>
    </nav>
  </header>

  <main>
    <!-- ============ 瓶子页 ============ -->
    <section id="bottle-view" class="view active" aria-label="许愿瓶">
      <div class="stage-wrap">
        <div class="stage" id="stage">
          <svg class="bottle-svg" viewBox="0 0 800 760" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <defs>
              <linearGradient id="glass-body" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"  stop-color="rgba(255,255,255,0.02)"/>
                <stop offset="14%" stop-color="rgba(255,255,255,0.16)"/>
                <stop offset="32%" stop-color="rgba(255,255,255,0.04)"/>
                <stop offset="62%" stop-color="rgba(255,255,255,0.02)"/>
                <stop offset="82%" stop-color="rgba(255,255,255,0.12)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
              </linearGradient>
              <linearGradient id="glass-shade" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(20,8,40,0.0)"/>
                <stop offset="80%" stop-color="rgba(20,8,40,0.18)"/>
                <stop offset="100%" stop-color="rgba(20,8,40,0.32)"/>
              </linearGradient>
              <radialGradient id="bottle-shadow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(0,0,0,0.45)"/>
                <stop offset="60%" stop-color="rgba(0,0,0,0.18)"/>
                <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
              </radialGradient>
              <linearGradient id="rim-grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0.10)"/>
              </linearGradient>
              <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="4" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>

            <!-- Ground shadow under bottle -->
            <ellipse cx="400" cy="710" rx="220" ry="22" fill="url(#bottle-shadow)"/>

            <!-- Bottle group (gets shaken via JS) -->
            <g id="bottle-group">
              <!-- Bottle silhouette -->
              <path id="bottle-shape"
                d="M 246 142
                   L 246 130
                   Q 246 118, 258 116
                   L 542 116
                   Q 554 118, 554 130
                   L 554 142
                   L 590 210
                   L 590 600
                   Q 590 686, 504 686
                   L 296 686
                   Q 210 686, 210 600
                   L 210 210
                   Z"
                fill="url(#glass-body)"
                stroke="rgba(255,255,255,0.30)"
                stroke-width="1.4"
              />
              <!-- Inner shadow tint -->
              <path
                d="M 246 142 L 590 210 L 590 600 Q 590 686, 504 686 L 296 686 Q 210 686, 210 600 L 210 210 L 554 142 Z"
                fill="url(#glass-shade)"
                opacity="0.6"
              />

              <!-- Rim (top of mouth) -->
              <ellipse cx="400" cy="116" rx="148" ry="12"
                fill="url(#rim-grad)"
                stroke="rgba(255,255,255,0.45)"
                stroke-width="1.2"/>
              <ellipse cx="400" cy="124" rx="148" ry="6"
                fill="none"
                stroke="rgba(255,255,255,0.18)"
                stroke-width="1"/>

              <!-- Inner highlight streaks -->
              <path d="M 248 220 Q 240 420, 252 600" stroke="rgba(255,255,255,0.30)" stroke-width="3" fill="none" stroke-linecap="round"/>
              <path d="M 260 240 Q 254 420, 264 580" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
              <path d="M 552 230 Q 560 420, 548 600" stroke="rgba(255,255,255,0.18)" stroke-width="2" fill="none" stroke-linecap="round"/>

              <!-- Hemp twine + small tag -->
              <g id="tag">
                <ellipse cx="400" cy="116" rx="155" ry="4" fill="none" stroke="rgba(210,180,140,0.55)" stroke-width="1.5" stroke-dasharray="2 2"/>
                <line x1="540" y1="116" x2="572" y2="156" stroke="rgba(210,180,140,0.65)" stroke-width="1.2"/>
                <g transform="translate(572 156) rotate(8)">
                  <path d="M 0 0 L 36 0 L 42 8 L 36 16 L 0 16 Z" fill="#f3e6c8" stroke="rgba(120,90,40,0.4)" stroke-width="0.8"/>
                  <text x="6" y="11.5" font-family="Long Cang, Noto Serif SC, serif" font-size="9" fill="rgba(90,60,30,0.85)">願</text>
                </g>
              </g>
            </g>
          </svg>

          <!-- Physics canvas overlay (stars drawn here) -->
          <canvas class="stars-canvas" id="stars-canvas" width="800" height="760"></canvas>

          <!-- Floating glow particles inside bottle -->
          <div class="bottle-glow" aria-hidden="true"></div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="btn-wish">
            <span class="btn-ico">✎</span>
            <span>许个愿</span>
          </button>
          <button class="btn btn-ghost" id="btn-shake">
            <span class="btn-ico">✦</span>
            <span>摇一摇</span>
          </button>
        </div>

        <p class="hint">把鼠标轻轻划过瓶子里 · 星星会跟着晃</p>
      </div>
    </section>

    <!-- ============ 我的页 ============ -->
    <section id="mine-view" class="view" aria-label="我的愿望">
      <div class="mine-head">
        <h2>许过的愿</h2>
        <p class="mine-sub">每一颗星星都是一个未来</p>
      </div>
      <div class="sub-tabs" role="tablist">
        <button class="sub-tab active" data-status="pending" role="tab">未实现 <span class="count" id="count-pending">0</span></button>
        <button class="sub-tab" data-status="done" role="tab">已成真 <span class="count" id="count-done">0</span></button>
      </div>
      <div class="wish-list" id="wish-list"></div>
      <div class="empty" id="wish-empty" hidden>
        <div class="empty-ico">✦</div>
        <p>还没有许过愿哦</p>
        <p class="empty-sub">回到瓶子页面 · 把心愿投进去吧</p>
      </div>
    </section>
  </main>

  <!-- ============ Wish input modal ============ -->
  <div class="modal" id="wish-modal" hidden>
    <div class="modal-mask"></div>
    <div class="letter letter-write" role="dialog" aria-modal="true" aria-label="写下愿望">
      <div class="letter-stamp">
        <div class="stamp-inner">
          <span class="stamp-zh">願</span>
          <span class="stamp-en">WISH</span>
        </div>
      </div>
      <div class="letter-header">
        <span class="letter-date" id="letter-date">—</span>
        <span class="letter-title">亲爱的自己</span>
      </div>
      <div class="letter-lined">
        <textarea
          id="wish-input"
          class="letter-input"
          maxlength="140"
          placeholder="我希望……
（写下一个让你心里发亮的愿望）"
        ></textarea>
        <div class="char-count"><span id="char-count">0</span> / 140</div>
      </div>
      <div class="letter-footer">
        <span class="signature">— 致未来的我</span>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-cancel">放下</button>
        <button class="btn btn-primary" id="btn-confirm">投进瓶子 ✦</button>
      </div>
    </div>
  </div>

  <!-- ============ Drawn wish modal ============ -->
  <div class="modal" id="show-modal" hidden>
    <div class="modal-mask"></div>
    <div class="letter letter-show" role="dialog" aria-modal="true">
      <div class="letter-stamp letter-stamp-soft">
        <div class="stamp-inner">
          <span class="stamp-zh">緣</span>
          <span class="stamp-en">FATE</span>
        </div>
      </div>
      <div class="letter-header">
        <span class="letter-date" id="show-date">—</span>
        <span class="letter-title">来自瓶中的回信</span>
      </div>
      <div class="letter-lined">
        <div class="letter-show-text" id="show-text">…</div>
      </div>
      <div class="letter-footer">
        <span class="signature" id="show-status">— 还在等待中</span>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-show-close">放回瓶中</button>
        <button class="btn btn-primary" id="btn-show-done">这个愿已成真 ✓</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <!-- Matter.js + GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <!-- React + Babel for Tweaks panel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="physics.js"></script>
  <script src="app.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>
</body>
</html>
